# .github/workflows/flutter.yml
# Career Navigator FRONTEND — CI/CD Pipeline
# CI : install deps, static analysis, full unit + widget test suite
# CD : build release APK, upload artifact, publish GitHub Release
name: Career Navigator – Flutter CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write          # needed to publish Releases

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  # ── 1. CONTINUOUS INTEGRATION ─────────────────────────────
  test:
    name: 🧪 Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/
        continue-on-error: true      # style warning only, never blocks

      - name: Static analysis
        run: flutter analyze --no-fatal-infos
        continue-on-error: true      # report issues without failing the build

      - name: Run all tests
        run: flutter test --reporter=expanded

  # ── 2. CONTINUOUS DELIVERY ────────────────────────────────
  build:
    name: 🤖 Build & Release APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/career-navigator-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: career-navigator-apk
          path: dist/*.apk
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Career Navigator Build ${{ github.run_number }}
          body: "Automated build from commit ${{ github.sha }}"
          files: dist/*.apk

  # ── 3. RESULT SUMMARY ─────────────────────────────────────
  notify:
    name: 📣 Pipeline Result
    runs-on: ubuntu-latest
    needs: [test, build]
    if: always()
    steps:
      - run: |
          echo "===================================="
          echo "   Career Navigator Flutter CI/CD"
          echo "===================================="
          echo "Tests : ${{ needs.test.result }}"
          echo "Build : ${{ needs.build.result }}"
          echo "===================================="
