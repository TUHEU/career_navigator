name: Career Navigator – Deploy to VPS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ──────────────────────────────────────────────────────────────
  # JOB 1 — TEST (runs on every push and PR)
  # ──────────────────────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check syntax (no import errors)
        run: python -c "import app; print('✅ app.py syntax OK')"

      - name: Run tests (if tests/ folder exists)
        run: |
          if [ -d "tests" ]; then
            pip install pytest
            pytest tests/ -v
          else
            echo "No tests directory found — skipping tests"
          fi

  # ──────────────────────────────────────────────────────────────
  # JOB 2 — DEPLOY (runs only on push to main/master)
  # ──────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: test                         # only deploy if tests pass
    if: github.event_name == 'push'     # not on pull requests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH to Contabo VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}

          script: |
            echo "──────────────────────────────────────────"
            echo "  Career Navigator — Deploying..."
            echo "──────────────────────────────────────────"

            # ── Go to backend folder ──────────────────────
            cd /root/CARRER-NAVIGATOR-BACKEND || {
              echo "❌ Backend folder not found"; exit 1
            }

            # ── Pull latest code ──────────────────────────
            git pull origin main || git pull origin master
            echo "✅ Code updated"

            # ── Install / update Python dependencies ──────
            pip install -r requirements.txt --quiet
            echo "✅ Dependencies installed"

            # ── Restart app with PM2 ──────────────────────
            pm2 restart career-navigator-api || pm2 start app.py \
              --name career-navigator-api \
              --interpreter python3
            pm2 save
            echo "✅ PM2 restarted"

            # ── Show status ───────────────────────────────
            pm2 status career-navigator-api
            echo "──────────────────────────────────────────"
            echo "  ✅ Deployment complete!"
            echo "──────────────────────────────────────────"

  # ──────────────────────────────────────────────────────────────
  # JOB 3 — NOTIFY (always runs after deploy)
  # ──────────────────────────────────────────────────────────────
  notify:
    name: 📢 Notify Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment succeeded
        if: needs.deploy.result == 'success'
        run: |
          echo "🎉 Deployment to VPS succeeded!"
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "By     : ${{ github.actor }}"

      - name: Deployment failed
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ Deployment FAILED"
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "By     : ${{ github.actor }}"
          exit 1