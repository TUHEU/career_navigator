# .github/workflows/deploy.yml
# Career Navigator Backend — CI/CD Pipeline v8.0
# Updated: runs real pytest tests, deploys to Contabo VPS via SSH

name: Career Navigator – Deploy to VPS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── 1. Run Tests ──────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check app.py syntax
        run: |
          python -m py_compile app.py
          echo "✅ app.py syntax OK"

      - name: Run pytest tests
        env:
          DB_HOST:      localhost
          DB_PORT:      3306
          DB_USER:      root
          DB_PASS:      ""
          DB_NAME:      career_navigator
          JWT_SECRET:   ci-test-secret
          AI_PROVIDER:  gemini
          AI_API_KEY:   ci-test-key
          FLASK_ENV:    testing
        run: pytest tests/ -v --tb=short

  # ── 2. Deploy to VPS ──────────────────────────────────────
  deploy:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH to Contabo VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}

          script: |
            echo "────────────────────────────────────────"
            echo "  Career Navigator — Deploying..."
            echo "────────────────────────────────────────"

            cd /root/CARRER-NAVIGATOR-BACKEND || {
              echo "❌ Backend folder not found"; exit 1
            }

            git pull origin main || git pull origin master
            echo "✅ Code updated"

            pip install -r requirements.txt --quiet --break-system-packages
            echo "✅ Dependencies installed"

            pm2 restart career-navigator-api || pm2 start app.py \
              --name career-navigator-api \
              --interpreter python3
            pm2 save
            echo "✅ PM2 restarted"

            pm2 status career-navigator-api
            echo "────────────────────────────────────────"
            echo "  ✅ Deployment complete!"
            echo "────────────────────────────────────────"

  # ── 3. Notify Status ──────────────────────────────────────
  notify:
    name: 📢 Notify Status
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always()

    steps:
      - name: Report result
        run: |
          echo "════════════════════════════════════════"
          echo "  Career Navigator Backend CI v8.0"
          echo "════════════════════════════════════════"
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "✅ Tests      : passed"
          else
            echo "❌ Tests      : FAILED — deploy was blocked"
          fi
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ Deploy     : succeeded"
          elif [ "${{ needs.deploy.result }}" = "skipped" ]; then
            echo "⏭️  Deploy     : skipped (PR — not a push)"
          else
            echo "❌ Deploy     : FAILED"
          fi
          echo "Branch : ${{ github.ref_name }}"
          echo "Commit : ${{ github.sha }}"
          echo "By     : ${{ github.actor }}"
          echo "════════════════════════════════════════"
          if [ "${{ needs.test.result }}" != "success" ]; then
            exit 1
          fi
