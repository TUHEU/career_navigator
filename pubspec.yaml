name: career_navigator
description: "Career Navigator — Job seeker and mentor platform."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # Localizations (built into Flutter SDK — no download needed)
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Networking
  http: ^1.2.0

  # Real-time / WebSocket
  socket_io_client: ^3.1.4

  # State management
  provider: ^6.1.5+1

  # Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.1

  # Media
  image_picker: ^1.2.2

  # Device features
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  geolocator: ^14.0.2

  # Config
  flutter_dotenv: ^6.0.1

  # Splash screen
  flutter_native_splash: ^2.4.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

# ── App icon ──────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A192F"
  adaptive_icon_foreground: "assets/logo/logo.png"

# ── Splash screen ─────────────────────────────────────────────
flutter_native_splash:
  color: "#0A192F"
  image: assets/logo/logo.png
  android: true
  ios: true
  fullscreen: true

# ── Flutter ───────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/background/bg2.png
    - assets/background/bg3.png
    - assets/background/bg6.png
    - assets/background/bg8.png
    - assets/logo/logo.png
